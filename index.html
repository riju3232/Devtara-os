<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevtaraOS v1.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- HEADER (Hidden until login) -->
        <header id="appHeader" style="display:none;">
            <div class="header-content">
                <h2>👑 DevtaraOS v1.0</h2>
                <button onclick="logout()" class="btn-logout">Logout</button>
            </div>
            <nav id="navBar">
                <button onclick="showView('saleView')">🛒 Sale</button>
                <button onclick="showView('expenseView')">💸 Exp</button>
                <button onclick="showView('dashView')">📊 Dashboard</button>
            </nav>
        </header>

        <!-- 1. LOGIN SCREEN -->
        <div id="loginView" class="view-card">
            <h1>🔒 System Login</h1>
            <input type="text" id="loginUser" placeholder="Username">
            <input type="password" id="loginPass" placeholder="Password">
            <button onclick="attemptLogin()" class="btn-primary">Unlock</button>
            <p id="loginError" style="color:red; display:none;"></p>
        </div>

        <!-- 2. SALE ENTRY -->
        <div id="saleView" style="display:none;">
            <h3>🛒 Record Sale</h3>
            <select id="saleShop">
                <option value="Beauty Parlor">Beauty Parlor</option>
                <option value="Apparels Emporium">Apparels Emporium</option>
                <option value="Fine Dine Restaurant">Fine Dine Restaurant</option>
            </select>
            <input type="number" id="saleAmount" placeholder="Amount (₹)">
            <select id="saleMethod"><option value="Cash">Cash</option><option value="GP">GP</option></select>
            <button onclick="submitSale()" class="btn-success">Save Sale</button>
        </div>

        <!-- 3. EXPENSE ENTRY -->
        <div id="expenseView" class="view-card" style="display:none;">
            <h3>💸 Record Expense</h3>
            <select id="expShop" onchange="handleExpShopChange()">
                <option value="Beauty Parlor">Beauty Parlor</option>
                <option value="Apparels Emporium">Apparels Emporium</option>
                <option value="Fine Dine Restaurant">Fine Dine Restaurant</option>
            </select>
            <select id="expCategory"></select>
            <input type="number" id="expAmount" placeholder="Amount (₹)">
            <input type="text" id="expRemarks" placeholder="Remarks">
            <button onclick="submitExpense()" class="btn-danger">Save Expense</button>
        </div>

        <!-- 4. DASHBOARD VIEW -->
        <div id="dashView" class="view-card" style="display:none;">
            <h3>📊 Hisab</h3>
            <div class="dash-grid"></div>
        </div>

        <!-- LOADING OVERLAY -->
        <div id="loadingOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); justify-content:center; align-items:center;">
            Processing...
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
